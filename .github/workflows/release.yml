name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Locate JAR
        id: locate
        run: |
          jar=$(ls build/libs/*.jar 2>/dev/null | head -1)
          echo "path=$jar" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $jar)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.locate.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }} (${{ github.sha[0:7] }})
          body: |
            Automatic release from commit [${{ github.sha[0:7] }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).
          files: ${{ steps.locate.outputs.path }}
          make_latest: true
